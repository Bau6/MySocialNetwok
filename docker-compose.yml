services:
  postgres:
    image: postgres:15
    container_name: social_network_postgres
    environment:
      POSTGRES_DB: social_network
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: social_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - social_network_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: social_network_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/social_network
      SPRING_DATASOURCE_USERNAME: social_user
      SPRING_DATASOURCE_PASSWORD: social_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: your-secret-key-change-it-in-production-please-make-it-long-enough-256-bits
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    networks:
      - social_network_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: social_network_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/api
    networks:
      - social_network_network
    restart: unless-stopped

networks:
  social_network_network:
    driver: bridge

volumes:
  postgres_data: