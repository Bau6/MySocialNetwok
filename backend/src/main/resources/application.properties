spring.application.name=backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/social_network
spring.datasource.username=social_user
spring.datasource.password=social_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=your-secret-key-change-it-in-production-please-make-it-long-enough-256-bits
jwt.expiration=86400000

# Server Configuration
server.port=8080

# Logging
logging.level.com.socialnetwork=DEBUG
logging.level.org.springframework.security=DEBUG