spring.application.name=backend

# Database
spring.datasource.url=jdbc:postgresql://postgres:5432/social_network
spring.datasource.username=social_user
spring.datasource.password=social_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=your-secret-key-change-it-in-production-please-make-it-long-enough-256-bits
jwt.expiration=86400000

server.port=8080
logging.level.com.socialnetwork=DEBUG